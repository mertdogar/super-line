<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>super-line chat — join</title>
<style>
  :root { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  * { box-sizing: border-box; }
  body { margin: 0; background: #0f1115; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .join { display: flex; flex-direction: column; gap: 13px; width: 300px; padding: 26px; background: #1a1d24; border-radius: 14px; box-shadow: 0 20px 60px rgba(0,0,0,.45); }
  .join h1 { margin: 0 0 6px; font-size: 19px; color: #e6e6e6; }
  .join label { display: flex; flex-direction: column; gap: 5px; font-size: 12px; color: #9aa0aa; }
  .join input { padding: 9px 11px; border: 1px solid #2c313a; border-radius: 9px; background: #11141a; color: #e6e6e6; font-size: 14px; }
  .join button { padding: 10px 14px; border: 0; border-radius: 9px; background: #22d3ee; color: #0f1115; font-size: 14px; font-weight: 600; }
</style>
</head>
<body>
  <div class="join">
    <h1>super-line chat</h1>
    <label>Name<input value="ada" /></label>
    <label>Room<input value="lobby" /></label>
    <button>Join</button>
  </div>
</body>
</html>
