name: store-pglite

# Every app container is the same image (built once); they differ only by command + env.
x-app: &app
  build:
    context: ../..
    dockerfile: examples/store-pglite/Dockerfile
  image: super-line-store-pglite:dev

services:
  # Central Postgres — the source of truth (writes + strong reads). wal_level=logical so Electric can replicate.
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: electric
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    command: [-c, listen_addresses=*, -c, wal_level=logical]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d electric']
      interval: 2s
      timeout: 3s
      retries: 15

  # Electric — streams the `resources` table out as HTTP shapes to each node's local PGlite replica.
  electric:
    image: electricsql/electric
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/electric?sslmode=disable
      ELECTRIC_INSECURE: 'true'
    depends_on:
      postgres: { condition: service_healthy }

  # Two super-line nodes. No adapter configured — Postgres+Electric is the only fan-out infra.
  node-1:
    <<: *app
    command: pnpm --filter @super-line/example-store-pglite server
    environment:
      PORT: '8801'
      NODE_NAME: node-1
      PG_URL: postgres://postgres:password@postgres:5432/electric
      ELECTRIC_URL: http://electric:3000/v1/shape
    ports: ['8801:8801'] # exposed so you can also connect a client from the host
    healthcheck:
      test: ['CMD', 'node', '-e', "require('net').connect(8801,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 2s
      timeout: 3s
      retries: 30
    depends_on: [electric]

  node-2:
    <<: *app
    command: pnpm --filter @super-line/example-store-pglite server
    environment:
      PORT: '8801'
      NODE_NAME: node-2
      PG_URL: postgres://postgres:password@postgres:5432/electric
      ELECTRIC_URL: http://electric:3000/v1/shape
    ports: ['8802:8801']
    healthcheck:
      test: ['CMD', 'node', '-e', "require('net').connect(8801,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 2s
      timeout: 3s
      retries: 30
    depends_on: [electric]

  # Writer pinned to node-1; reader pinned to node-2. The reader seeing the writer's increments IS the
  # cross-node proof: the change traveled node-1 → Postgres → Electric → node-2's replica → the reader.
  # depends_on service_healthy: the client doesn't retry the INITIAL connect, so wait until the node listens.
  writer:
    <<: *app
    command: pnpm --filter @super-line/example-store-pglite client
    environment: { NODE_URL: ws://node-1:8801, CLIENT_ID: writer@node-1, WRITER: '1' }
    depends_on:
      node-1: { condition: service_healthy }

  reader:
    <<: *app
    command: pnpm --filter @super-line/example-store-pglite client
    environment: { NODE_URL: ws://node-2:8801, CLIENT_ID: reader@node-2 }
    depends_on:
      node-2: { condition: service_healthy }

  # Control Center webapp on :8081 — open http://localhost:8081. The browser connects it back to node-1's
  # inspector at ws://localhost:8801/inspect (the host-exposed port). NB: this example runs no super-line
  # adapter, so the inspector aggregates per-node — the Control Center shows the node it connects to (node-1);
  # repoint it at ws://localhost:8802/inspect from its Settings page to inspect node-2.
  control-center:
    build:
      context: ../..
      dockerfile: examples/store-pglite/Dockerfile.control-center
    image: super-line-store-pglite-cc:dev
    ports: ['8081:8081']
    depends_on:
      node-1: { condition: service_healthy }
